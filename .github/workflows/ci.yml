name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build lib package
        run: bun run build:lib

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Generate migrations
        run: bun run db:generate
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5433/test

      - name: Run tests
        run: |
          bun run test 2>&1 | tee /tmp/test-output.txt
          EXIT=${PIPESTATUS[0]}
          if grep -q "No tests found" /tmp/test-output.txt; then
            echo "No tests found — skipping"
            exit 0
          fi
          exit $EXIT

      - name: Run build
        env:
          VITE_BACKEND_URL: http://localhost:3000
          DATABASE_URL: postgresql://localhost:5432/test
        run: bun run build:frontend && bun run build:backend

